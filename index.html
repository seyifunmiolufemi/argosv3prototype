<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatBid — Argos v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Sans:wght@600&family=DM+Sans:opsz,wght@9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- Auth screens (1–6) -->
  <div id="auth-container"></div>

  <!-- Onboarding screens (7–9) -->
  <div id="onboarding-container"></div>

  <!-- Dashboard (sidebar + all pages) -->
  <div id="dashboard-container"></div>

  <script>
  // Load all HTML partials, then initialise
  (async function() {
    async function loadPartial(containerId, path) {
      var res = await fetch(path);
      var html = await res.text();
      document.getElementById(containerId).innerHTML = html;
    }
    await Promise.all([
      loadPartial('auth-container', 'html/auth.html'),
      loadPartial('onboarding-container', 'html/onboarding.html'),
      loadPartial('dashboard-container', 'html/dashboard.html')
    ]);
    // Load scripts after HTML is in the DOM
    function loadScript(src) {
      return new Promise(function(resolve) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
    }
    await loadScript('js/onboarding.js');
    await loadScript('js/core.js');
    await loadScript('js/extensions.js');
  })();
  </script>

</body>
</html>
