<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatBid — Argos v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Sans:wght@600&family=DM+Sans:opsz,wght@9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- Auth screens (1–6) -->
  <div id="auth-container"></div>

  <!-- Onboarding screens (7–9) -->
  <div id="onboarding-container"></div>

  <!-- Dashboard (sidebar + all pages) -->
  <div id="dashboard-container"></div>

  <script>
  // Load all HTML partials, then initialise
  (async function() {
    async function loadPartial(containerId, path) {
      var res = await fetch(path, {cache: 'no-cache'});
      var html = await res.text();
      document.getElementById(containerId).innerHTML = html;
    }
    await Promise.all([
      loadPartial('auth-container', 'html/auth.html'),
      loadPartial('onboarding-container', 'html/onboarding.html'),
      loadPartial('dashboard-container', 'html/dashboard.html'),
    ]);

    // Load dashboard sub-partials after dashboard shell is in DOM
    await Promise.all([
      loadPartial('sidebar-container',            'html/sidebar.html'),
      loadPartial('issue-center-container',       'html/issue-center.html'),
      loadPartial('feed-data-tool-container',     'html/feed-data-tool.html'),
      loadPartial('permission-manager-container', 'html/permission-manager.html'),
      loadPartial('annotations-container',        'html/annotations.html'),
      loadPartial('alerts-container',             'html/alerts.html'),
      loadPartial('business-rules-container',     'html/business-rules.html'),
      loadPartial('overview-container',           'html/overview.html'),
      loadPartial('highlights-container',         'html/highlights-table.html'),
      loadPartial('pivot-container',              'html/pivot.html'),
      loadPartial('line-chart-container',         'html/line-chart.html'),
      loadPartial('forecasting-container',        'html/forecasting.html'),
      loadPartial('search-term-grader-container',   'html/search-term-grader.html'),
      loadPartial('feed-quality-check-container',   'html/feed-quality-check.html'),
      loadPartial('session-monitor-container',         'html/session-monitor.html'),
      loadPartial('portfolio-performance-container',  'html/portfolio-performance.html'),
      loadPartial('client-management-container',      'html/client-management.html'),
      loadPartial('modals-container',                 'html/modals-shared.html'),
    ]);
    // Load scripts after HTML is in the DOM
    var _v = Date.now();
    function loadScript(src) {
      return new Promise(function(resolve) {
        var s = document.createElement('script');
        s.src = src + '?v=' + _v;
        s.onload = resolve;
        document.body.appendChild(s);
      });
    }
    await loadScript('js/onboarding.js');
    await loadScript('js/core.js');
    await loadScript('js/client-management.js');
    await loadScript('js/feed-data-tool.js');
    await loadScript('js/permission-manager.js');
    await loadScript('js/annotations.js');
    await loadScript('js/alerts.js');
    await loadScript('js/business-rules.js');
    await loadScript('js/overview.js');
    await loadScript('js/highlights-table.js');
    await loadScript('js/pivot.js');
    await loadScript('js/line-chart.js');
    await loadScript('js/forecasting.js');
    await loadScript('js/search-term-grader.js');
    await loadScript('js/feed-quality-check.js');
    await loadScript('js/session-monitor.js');
    await loadScript('js/portfolio-performance.js');
  })();
  </script>

</body>
</html>
