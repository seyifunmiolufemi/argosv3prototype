<style>
/* ── Portfolio Performance ── */
#portfolio-performance-page { display:none; padding:32px 32px 64px; box-sizing:border-box; }

/* Dropdowns */
.pp-dd-btn { padding:6px 10px; background:var(--color-white); border:1px solid var(--color-border); border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--color-text-primary); cursor:pointer; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
.pp-dd-btn:hover { background:var(--color-bg-grey50); }
.pp-dd-panel { display:none; position:fixed; z-index:9999; background:var(--color-white); border:1px solid var(--color-border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.1); padding:4px 0; max-height:280px; overflow-y:auto; min-width:160px; }
.pp-dd-item { padding:8px 14px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--color-text-primary); cursor:pointer; white-space:nowrap; }
.pp-dd-item:hover { background:var(--color-bg-grey50); }
.pp-dd-item.pp-dd-sel { color:var(--color-blue); font-weight:600; }

/* Primary action buttons use design system .btn-primary-sm */

/* Filter bar */
.pp-filter-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.pp-ga-row { display:none; align-items:center; gap:8px; margin-bottom:10px; }
.pp-ga-row.pp-ga-visible { display:flex; }
.pp-ga-label { font-size:13px; color:var(--color-text-caption); font-family:'DM Sans',sans-serif; }
.pp-ga-input { padding:6px 10px; border:1px solid var(--color-border); border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--color-text-primary); background:var(--color-white); outline:none; min-width:180px; }
.pp-ga-input:focus { border-color:var(--color-blue); }
.pp-ga-clear { background:none; border:none; cursor:pointer; color:var(--color-text-caption); display:inline-flex; align-items:center; padding:4px; border-radius:4px; }
.pp-ga-clear:hover { background:var(--color-bg-grey50); color:var(--color-text-primary); }

/* Divider */
.pp-divider { height:1px; background:var(--color-border); margin:12px 0 16px; }

/* Chart card */
.pp-chart-card { background:var(--color-white); border:1px solid var(--color-border); border-radius:8px; padding:20px 24px; margin-bottom:16px; }
.pp-chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.pp-chart-title { font-size:14px; font-weight:600; color:var(--color-text-primary); font-family:'DM Sans',sans-serif; }

/* Zoom button */
.pp-zoom-btn { padding:5px 12px; background:var(--color-white); border:1px solid var(--color-border); border-radius:8px; font-size:12px; font-family:'DM Sans',sans-serif; color:var(--color-text-primary); cursor:pointer; display:none; align-items:center; gap:5px; }
.pp-zoom-btn:hover { background:var(--color-bg-grey50); }
.pp-zoom-btn.pp-zoom-visible { display:inline-flex; }

/* Table card */
.pp-table-card { background:var(--color-white); border:1px solid var(--color-border); border-radius:8px; overflow:hidden; }
.pp-table { width:100%; border-collapse:collapse; font-size:13px; font-family:'DM Sans',sans-serif; }
.pp-th { padding:10px 14px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--color-text-subtitle); background:var(--color-bg-grey50); border-bottom:1px solid var(--color-border); cursor:pointer; user-select:none; white-space:nowrap; }
.pp-th.pp-th-right { text-align:right; }
.pp-th:hover { background:#e9edf1; }
.pp-td { padding:10px 14px; border-bottom:1px solid var(--color-border); color:var(--color-text-primary); vertical-align:middle; }
.pp-td.pp-td-right { text-align:right; }
.pp-tr:last-child .pp-td { border-bottom:none; }
.pp-tr:hover .pp-td { background:var(--color-bg-grey50); }

/* Pagination */
.pp-pagination { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-top:1px solid var(--color-border); flex-wrap:wrap; gap:8px; }
.pp-page-info { font-size:13px; color:var(--color-text-caption); font-family:'DM Sans',sans-serif; }
.pp-page-controls { display:flex; align-items:center; gap:8px; }
.pp-page-size-row { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--color-text-caption); font-family:'DM Sans',sans-serif; }

/* Empty / loading */
.pp-empty { display:flex; flex-direction:column; align-items:center; padding:64px 24px; gap:10px; text-align:center; }
.pp-empty-icon { color:var(--color-text-caption); margin-bottom:6px; }
.pp-empty-title { font-size:15px; font-weight:500; color:var(--color-text-primary); margin:0; }
.pp-empty-sub { font-size:13px; color:var(--color-text-caption); margin:0; }
.pp-spinner-wrap { display:flex; align-items:center; justify-content:center; padding:48px; gap:10px; font-size:13px; color:var(--color-text-caption); font-family:'DM Sans',sans-serif; }
@keyframes pp-spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
.pp-spinner { width:18px; height:18px; border:2px solid var(--color-border); border-top-color:var(--color-blue); border-radius:50%; animation:pp-spin 0.7s linear infinite; }

/* Dark mode overrides */
body.dark-mode .pp-dd-btn { background:var(--color-container); }
body.dark-mode .pp-dd-panel { background:var(--color-container); }
body.dark-mode .pp-chart-card { background:var(--color-container); }
body.dark-mode .pp-table-card { background:var(--color-container); }
body.dark-mode .pp-zoom-btn { background:var(--color-container); }
body.dark-mode .pp-ga-input { background:var(--color-container); }
body.dark-mode .pp-th { background:var(--color-bg-grey50); }
</style>

<div id="portfolio-performance-page" style="display:none; padding:32px 32px 64px; box-sizing:border-box;">

  <!-- Page heading row -->
  <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px;">
    <div>
      <h1 style="font-size:22px; font-weight:700; color:var(--color-text-primary); font-family:'Instrument Sans',sans-serif; margin:0 0 4px;">Portfolio Performance</h1>
      <p style="font-size:13px; color:var(--color-text-subtitle); font-family:'DM Sans',sans-serif; margin:0;">View performance metrics across all clients or websites in a sorted chart format.</p>
    </div>
    <button id="pp-export-btn" class="btn-primary-sm">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export
    </button>
  </div>

  <!-- Breadcrumb -->
  <div style="font-size:12px; color:var(--color-text-caption); font-family:'DM Sans',sans-serif; margin-bottom:20px;">
    <span style="cursor:pointer; color:var(--color-blue);" id="pp-breadcrumb-reports">Reports</span>
    <span style="margin:0 4px;">›</span>
    <span>Portfolio Performance</span>
  </div>

  <!-- Main filter row -->
  <div class="pp-filter-row" id="pp-filter-row">

    <!-- Portfolio View Level -->
    <div style="position:relative;" id="pp-wrap-view">
      <button class="pp-dd-btn" id="pp-btn-view">
        <span id="pp-lbl-view">Client</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-view"></div>
    </div>

    <!-- Data Source -->
    <div style="position:relative;" id="pp-wrap-source">
      <button class="pp-dd-btn" id="pp-btn-source">
        <span id="pp-lbl-source">Google Ads</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-source"></div>
    </div>

    <!-- Metric -->
    <div style="position:relative;" id="pp-wrap-metric">
      <button class="pp-dd-btn" id="pp-btn-metric">
        <span id="pp-lbl-metric">Impressions</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-metric"></div>
    </div>

    <!-- Calculation -->
    <div style="position:relative;" id="pp-wrap-calc">
      <button class="pp-dd-btn" id="pp-btn-calc">
        <span id="pp-lbl-calc">Percent Change</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-calc"></div>
    </div>

    <!-- Comparison -->
    <div style="position:relative;" id="pp-wrap-comp">
      <button class="pp-dd-btn" id="pp-btn-comp">
        <span id="pp-lbl-comp">Year over Year</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-comp"></div>
    </div>

    <!-- Date Range -->
    <div style="position:relative;" id="pp-wrap-date">
      <button class="pp-dd-btn" id="pp-btn-date">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span id="pp-lbl-date">Last 30 Days</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-date"></div>
    </div>

  </div>

  <!-- Google Analytics secondary filter row -->
  <div class="pp-ga-row" id="pp-ga-row">
    <span class="pp-ga-label">Filter traffic source:</span>
    <div style="position:relative;" id="pp-wrap-gafilter">
      <button class="pp-dd-btn" id="pp-btn-gafilter">
        <span id="pp-lbl-gafilter">Contains</span>
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="pp-dd-panel" id="pp-panel-gafilter"></div>
    </div>
    <input type="text" class="pp-ga-input" id="pp-ga-input" placeholder="e.g. google / cpc" />
    <button class="pp-ga-clear" id="pp-ga-clear" title="Clear">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Divider + Analyse button -->
  <div class="pp-divider"></div>
  <div style="margin-bottom:24px;">
    <button id="pp-analyse-btn" class="btn-primary-sm">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span id="pp-analyse-label">Analyse</span>
    </button>
  </div>

  <!-- Results (hidden until Analyse is clicked) -->
  <div id="pp-results" style="display:none;">

    <!-- Chart card -->
    <div class="pp-chart-card">
      <div class="pp-chart-header">
        <div class="pp-chart-title" id="pp-chart-title">Impressions — Percent Change (Year over Year)</div>
        <button class="pp-zoom-btn" id="pp-zoom-btn">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          <span id="pp-zoom-label">Zoom In</span>
        </button>
      </div>
      <div id="pp-chart" style="width:100%;"></div>
    </div>

    <!-- Table card -->
    <div class="pp-table-card">
      <div style="overflow-x:auto;">
        <table class="pp-table">
          <thead><tr id="pp-thead-row"></tr></thead>
          <tbody id="pp-tbody"></tbody>
        </table>
      </div>
      <div class="pp-pagination">
        <div class="pp-page-info" id="pp-page-info"></div>
        <div class="pp-page-controls">
          <div class="pp-page-size-row">
            <span>Rows:</span>
            <div style="position:relative;" id="pp-wrap-pagesize">
              <button class="pp-dd-btn" id="pp-btn-pagesize" style="padding:4px 8px; font-size:12px;">
                <span id="pp-lbl-pagesize">10</span>
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div class="pp-dd-panel" id="pp-panel-pagesize" style="min-width:80px;"></div>
            </div>
          </div>
          <button class="btn-outline btn-sm" id="pp-prev-btn">Previous</button>
          <button class="btn-outline btn-sm" id="pp-next-btn">Next</button>
        </div>
      </div>
    </div>

  </div>

</div>
